name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  schedule:
    # Rebuild weekly to pick up the latest agent + base image patches.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      agent_version:
        description: "Azure Pipelines agent version (blank = latest release)"
        required: false
        default: ""

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve agent version
        id: agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ github.event.inputs.agent_version }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION}" ]; then
            version="${INPUT_VERSION#v}"
            echo "Using manually requested version: ${version}"
          else
            # Authenticated call (GITHUB_TOKEN) -> high rate limit. Picks the
            # latest non-prerelease from microsoft/azure-pipelines-agent.
            version="$(gh api repos/microsoft/azure-pipelines-agent/releases/latest --jq '.tag_name')"
            version="${version#v}"
            echo "Resolved latest upstream version: ${version}"
          fi
          if [ -z "${version}" ] || [ "${version}" = "null" ]; then
            echo "::error::could not resolve agent version" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=agent-${{ steps.agent.outputs.version }}
            type=sha,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Version resolved above (latest upstream release, or manual input).
          build-args: |
            AZP_AGENT_VERSION=${{ steps.agent.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
