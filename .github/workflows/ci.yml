name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -e SC1091
        with:
          scandir: "."
          additional_files: "start.sh install.sh uninstall.sh"

  hadolint:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # DL3008: pin apt versions — acceptable for a base agent image.
          ignore: DL3008

  build-test:
    name: Build image (no push)
    runs-on: ubuntu-latest
    needs: [shellcheck, hadolint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: azp-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (agent binary present)
        run: |
          docker run --rm --entrypoint bash azp-agent:ci -c \
            'test -f /azp/config.sh && test -f /azp/run.sh && echo "agent files OK"'
