name: Bug report
description: Report a problem with the image, scripts, or workflows
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill out the sections below.
        Do **not** include your PAT or any secrets in this report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue? Include the exact command.
      placeholder: |
        1. docker run ... / sudo ./install.sh ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: image-tag
    attributes:
      label: Image tag / agent version
      placeholder: "ghcr.io/pipelinekit/azure-pipelines-agent:latest or agent 4.255.0"
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - Docker (docker run)
        - Docker Compose
        - Native install.sh
    validations:
      required: true
  - type: input
    id: host
    attributes:
      label: Host OS / architecture
      placeholder: "Ubuntu 22.04, x86_64"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste logs here. Redact any tokens or URLs you don't want public.
      render: shell
